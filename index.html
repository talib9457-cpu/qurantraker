:root {
  --gold: #D4A843;
  --gold-light: #E8C96A;
  --gold-dark: #B8892E;
  --bg-deep: #0A0E1A;
  --bg-card: #111827;
  --text-primary: #F1F0EB;
  --text-secondary: #8B9AB5;
  --green: #2DD4A8;
  --green-dark: #0D9373;
  --emerald: #10B981;
  --blue: #60A5FA;
  --blue-dark: #3B82F6;
  --border: rgba(212, 168, 67, 0.15);
  --shadow-gold: rgba(212, 168, 67, 0.08);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* Unit Toggle for Ayah/Page selection */
.entry-unit-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.unit-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid transparent;
  font-family: 'Tajawal', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: rgba(212, 168, 67, 0.06);
  color: var(--text-secondary);
  border-color: rgba(212, 168, 67, 0.15);
}

.unit-btn.active {
  background: rgba(212, 168, 67, 0.15);
  border-color: var(--gold);
  color: var(--gold);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(212, 168, 67, 0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(45, 212, 168, 0.02) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }

/* Install Banner */
.install-banner {
  background: linear-gradient(135deg, rgba(212, 168, 67, 0.1), rgba(212, 168, 67, 0.05));
  border: 1px solid rgba(212, 168, 67, 0.25);
  border-radius: 14px;
  padding: 14px 18px;
  margin-bottom: 20px;
  display: none;
  align-items: center;
  gap: 12px;
  animation: fadeUp 0.5s ease;
}

.install-banner.show { display: flex; }

.install-banner-text { flex: 1; }
.install-banner-text strong { color: var(--gold); font-size: 0.95rem; }
.install-banner-text p { color: var(--text-secondary); font-size: 0.8rem; margin-top: 2px; }

.install-btn {
  padding: 8px 18px;
  background: var(--gold);
  color: #0A0E1A;
  border: none;
  border-radius: 10px;
  font-family: 'Tajawal', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
}

.install-dismiss {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 4px;
}

/* Header */
.header { text-align: center; padding: 30px 16px 20px; }

.header::after {
  content: '﷽';
  display: block;
  font-family: 'Amiri', serif;
  /* Reduce the basmala size to make it subtler in the interface */
  font-size: 1.2rem;
  color: var(--gold);
  margin-bottom: 12px;
  opacity: 0.7;
}

.header h1 {
  font-family: 'Amiri', serif;
  font-size: 2.2rem;
  font-weight: 700;
