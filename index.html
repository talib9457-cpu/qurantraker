<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quran Tracker</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0b1020;
      color:#fff;
      display:flex;
      min-height:100vh;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
    .box{
      padding:24px;
      border-radius:16px;
      background:#121a2f;
      box-shadow:0 10px 30px rgba(0,0,0,.3);
    }
    h1{margin:0 0 12px}
    p{margin:0;color:#cfd6e4}
  </style>
</head>
<body>
  <div class="box">
    <h1>متتبع حفظ القرآن</h1>
    <p>الموقع يعمل. المشكلة كانت في التعديل الأخير.</p>
  </div>
</body>
</html>
